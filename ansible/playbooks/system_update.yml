- hosts: all
  become: yes
  tasks:
    - name: system_update
      apt:
        upgrade: dist
        update_cache: yes
      register: apt_update
      when: ansible_distribution == "Ubuntu"

    - name: reboot if required
      reboot:
        msg: "Reboot initiated by Ansible"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 10
        post_reboot_delay: 30
        test_command: whoami
      when: apt_update.changed
